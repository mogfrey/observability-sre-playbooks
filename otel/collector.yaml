extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 127.0.0.1:1777
  zpages:
    endpoint: 127.0.0.1:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 15
  resource:
    attributes:
      - key: deployment.environment.name
        value: ${env:DEPLOYMENT_ENVIRONMENT}
        action: upsert
      - key: service.namespace
        value: ${env:SERVICE_NAMESPACE}
        action: insert
      - key: telemetry.pipeline
        value: otel-gateway
        action: upsert
  batch:
    send_batch_size: 8192
    send_batch_max_size: 10000
    timeout: 5s

exporters:
  otlphttp/metrics:
    endpoint: ${env:METRICS_OTLP_ENDPOINT}
    headers:
      Authorization: ${env:METRICS_AUTH_HEADER}
    compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 10000
  otlphttp/logs:
    endpoint: ${env:LOGS_OTLP_ENDPOINT}
    headers:
      Authorization: ${env:LOGS_AUTH_HEADER}
    compression: gzip
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 10000
  otlp/traces:
    endpoint: ${env:TRACES_OTLP_ENDPOINT}
    headers:
      Authorization: ${env:TRACES_AUTH_HEADER}
    compression: gzip
    tls:
      insecure: false
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 10000
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

service:
  extensions:
    - health_check
    - pprof
    - zpages
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource
        - batch
      exporters:
        - otlphttp/metrics
    logs:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource
        - batch
      exporters:
        - otlphttp/logs
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource
        - batch
      exporters:
        - otlp/traces
